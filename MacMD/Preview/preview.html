<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" nonce="__MACMD_NONCE__" href="macmd-resource://app/preview-base.css">
<style id="macmd-theme" nonce="__MACMD_NONCE__">__MACMD_CSS__</style>
<script nonce="__MACMD_NONCE__" src="macmd-resource://app/markdown-it.min.js"></script>
<script nonce="__MACMD_NONCE__" src="macmd-resource://app/mermaid.min.js"></script>
</head>
<body>
<div id="content" class="markdown-body"></div>
<script nonce="__MACMD_NONCE__">
"use strict";
// markdown-it only in M2. mermaid.min.js is bundled and loaded but NOT invoked;
// mermaid.run() / mermaid.initialize() wiring is added in M4. html:false escapes
// any raw HTML in the untrusted document (the security model).
var md = window.markdownit({ html: false, linkify: true, typographer: false });

// Stamp each top-level block with its 1-based source line (from token.map) so the
// editor's top visible line can drive editor-to-preview scroll sync.
md.core.ruler.push("macmd_source_line", function (state) {
  state.tokens.forEach(function (token) {
    if (token.map && token.level === 0) {
      token.attrSet("data-source-line", String(token.map[0] + 1));
    }
  });
});

// Route relative image srcs through the validated img scheme; Swift does the
// containment check. Absolute paths and any explicit scheme are left as-is
// (remote schemes are blocked by the CSP and the content rule list).
function rewriteImages(container) {
  var imgs = container.querySelectorAll("img");
  for (var i = 0; i < imgs.length; i++) {
    var src = imgs[i].getAttribute("src") || "";
    if (src === "" || src.charAt(0) === "/" || /^[a-z][a-z0-9+.-]*:/i.test(src)) continue;
    imgs[i].setAttribute("src", "macmd-resource://img/" + encodeURIComponent(src));
  }
}

// Mermaid: rendered ONLY here (preview) and in export, never in the editor. Under
// securityLevel:'strict' mermaid DOMPurify-sanitizes the SVG and disables click/JS
// bindings. The CSP forbids 'unsafe-eval' (RED LINE); a diagram type that needs
// eval surfaces as a securitypolicyviolation and is dropped, never accommodated.
window.__mermaidConfig = null;
window.__mermaidRenderCount = 0;
var mermaidCache = {};
var mermaidReady = false;

function ensureMermaid() {
  if (!mermaidReady && window.mermaid) {
    window.mermaid.initialize({ startOnLoad: false, securityLevel: "strict" });
    window.__mermaidConfig = { startOnLoad: false, securityLevel: "strict" };
    mermaidReady = true;
  }
}

// FNV-1a hash of the diagram source, so an unchanged diagram skips re-render.
function fnv1a(str) {
  var h = 0x811c9dc5;
  for (var i = 0; i < str.length; i++) {
    h ^= str.charCodeAt(i);
    h = (h + ((h << 1) + (h << 4) + (h << 7) + (h << 8) + (h << 24))) >>> 0;
  }
  return ("0000000" + h.toString(16)).slice(-8);
}

// Replace each ```mermaid fenced block with its inline SVG. markdown-it emits a
// mermaid fence as <pre><code class="language-mermaid">. Cache hits reuse stored
// SVG and never call mermaid.
async function renderMermaid(container) {
  var blocks = container.querySelectorAll("code.language-mermaid");
  if (blocks.length === 0) return; // no mermaid: skip init and work entirely
  ensureMermaid();
  if (!window.mermaid) return;
  for (var i = 0; i < blocks.length; i++) {
    var code = blocks[i];
    var source = code.textContent;
    var hash = fnv1a(source);
    // Key the cache by source AND block position so two identical diagrams get
    // distinct SVG element ids (mermaid bakes the id into the SVG and its defs).
    var cacheKey = hash + "-" + i;
    var pre = code.parentNode;
    var wrapper = document.createElement("div");
    wrapper.className = "mermaid-diagram";
    wrapper.setAttribute("data-mermaid-hash", hash);
    if (mermaidCache[cacheKey] !== undefined) {
      wrapper.innerHTML = mermaidCache[cacheKey];
    } else {
      try {
        var out = await window.mermaid.render("mmd-" + cacheKey, source);
        wrapper.innerHTML = out.svg;
        mermaidCache[cacheKey] = out.svg;
        window.__mermaidRenderCount++;
      } catch (e) {
        continue; // leave the fenced code block if the diagram fails to render
      }
    }
    if (pre && pre.parentNode) { pre.parentNode.replaceChild(wrapper, pre); }
  }
}

window.render = function (markdown) {
  var container = document.getElementById("content");
  container.innerHTML = md.render(markdown);
  rewriteImages(container);
  // Advance the completion flag whether mermaid resolves or rejects, so the flag
  // never stalls (defense in depth; renderMermaid catches per-block failures).
  function done() { window.__renderComplete = (window.__renderComplete || 0) + 1; }
  renderMermaid(container).then(done, done);
};

// Headless render for HTML export: markdown-it only, NO image rewrite (the
// macmd-resource scheme only resolves inside the app, so a self-contained export
// keeps the original relative src). Returns the rendered body. M4 makes this
// async and inlines mermaid SVG.
window.renderForExport = async function (markdown) {
  var container = document.getElementById("content");
  container.innerHTML = md.render(markdown);
  // Drop external image references so the exported file makes NO network request
  // (no tracking beacon) when opened elsewhere. Only data: URIs and document-
  // relative paths survive; anything with a scheme (http:, https:, ...) or a
  // protocol-relative "//host" URL is removed. Relative images are then inlined
  // as data: URIs by HTMLExporter in Swift.
  var imgs = container.querySelectorAll("img");
  for (var i = 0; i < imgs.length; i++) {
    var src = imgs[i].getAttribute("src") || "";
    var isData = /^data:/i.test(src);
    var isExternal = /^[a-z][a-z0-9+.-]*:/i.test(src) || src.slice(0, 2) === "//";
    if (isExternal && !isData) { imgs[i].removeAttribute("src"); }
  }
  // Inline any mermaid diagrams as SVG before serializing, so the export awaits
  // completion (callAsyncJavaScript awaits the returned promise). A failure falls
  // back to markdown-only rather than an empty export.
  try { await renderMermaid(container); } catch (e) { /* markdown-only fallback */ }
  return container.innerHTML;
};

// Theme CSS is injected after load and on every ThemeController change.
window.setThemeCSS = function (css) {
  var el = document.getElementById("macmd-theme");
  if (el) { el.textContent = css; }
};

// Activate the resolved light/dark block by class on the document element, so the
// choice follows the editor appearance, not the system prefers-color-scheme.
window.setAppearance = function (name) {
  document.documentElement.className = name;
};

// Scroll the nearest block at or after the given 1-based source line into view.
window.scrollToLine = function (line) {
  var els = document.querySelectorAll("[data-source-line]");
  var target = null;
  for (var i = 0; i < els.length; i++) {
    if (parseInt(els[i].getAttribute("data-source-line"), 10) >= line) { target = els[i]; break; }
  }
  if (!target && els.length) { target = els[els.length - 1]; }
  if (target) { target.scrollIntoView({ block: "start" }); }
};
</script>
</body>
</html>
