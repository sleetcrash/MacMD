name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build and test
    runs-on: macos-15
    steps:
      - name: Check out
        uses: actions/checkout@v5

      - name: Reject em dashes (house rule)
        run: |
          # Em dash U+2014 is the UTF-8 bytes E2 80 94. Match the bytes via a shell
          # escape so this workflow file itself contains no literal em dash.
          # The vendored minified markdown-it / mermaid bundles legitimately
          # contain U+2014 bytes; exclude exactly those two files so first-party
          # sources stay covered.
          if git grep -nIF $'\xe2\x80\x94' -- . ':(exclude)MacMD/Preview/markdown-it.min.js' ':(exclude)MacMD/Preview/mermaid.min.js'; then
            echo "::error::Em dash found in tracked files. House rule is no em dashes."
            exit 1
          fi
          echo "No em dashes found."

      - name: Show toolchain
        run: xcodebuild -version

      - name: Build and test
        run: >
          xcodebuild test
          -project MacMD.xcodeproj
          -scheme MacMD
          -destination 'platform=macOS'
