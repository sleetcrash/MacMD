name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build and test
    runs-on: macos-15
    steps:
      - name: Check out
        uses: actions/checkout@v5

      - name: Show toolchain
        run: xcodebuild -version

      - name: Build and test
        run: >
          xcodebuild test
          -project MacMD.xcodeproj
          -scheme MacMD
          -destination 'platform=macOS'
